# render.yaml — Defines all services for Render deployment

services:
  # 🚀 FastAPI backend service
  - type: web
    name: marketplayground-backend
    env: python
    plan: starter
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "PYTHONPATH=./ uvicorn backend.app:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.9
    rootDir: .

  # 🔁 Background retraining worker
  - type: worker
    name: retrain-worker
    env: python
    plan: starter
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "PYTHONPATH=./ python backend/retrain_worker.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    rootDir: .

  # 📰 News Ingestor — now runs once per hour using Render’s cron feature
  - type: worker
    name: news-ingestor
    env: python
    plan: starter
    schedule: "hourly"
    buildCommand: "pip install -r backend/requirements-news.txt"
    startCommand: "PYTHONPATH=./ python backend/news_ingestor.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    rootDir: .

  # 🧠 Belief Feeder worker
  - type: worker
    name: belief-feeder
    env: python
    plan: starter
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "PYTHONPATH=./ python backend/belief_feeder.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    rootDir: .
